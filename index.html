<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://unpkg.com/lucide@latest"></script>
    </head>
    <body class="h-screen flex justify-center sm:items-center sm:py-5">
        <div id="main-container" class=" dark:bg-gray-900 relative flex flex-col h-full sm:w-96 bg-sky-50 px-5 py-5 sm:h-auto sm:rounded-2xl">
            <div class="w-full">
                <div class="flex justify-between">
                    <div class="text-2xl font-semibold tracking-tight dark:text-white">My Weather App</div>
                    <button type="button" id="theme-toggle" class="dark:bg-gray-700 rounded-full p-2 bg-white cursor-pointer">
                        <i data-lucide="moon"></i>
                    </button>
                 </div>
                <div id="search-box" class="flex gap-2 w-full mt-5">
                    <input type="text" placeholder="Enter city name..." id="city-input" 
                    class="dark:bg-gray-800 dark:text-white dark:border-gray-600 flex-1 px-2 py-2 border bg-white font-semibold border-blue-200 rounded-2xl text-md outline-none focus:border-blue-400 transition-all" />
                    <button type="button" id="search-btn" 
                    class="cursor-pointer w-auto px-5 py-2 bg-blue-500 text-white font-semibold text-md 
                    rounded-2xl hover:bg-blue-600 active:scale-95 transition-all duration-200 ease-in-out">Search</button>
                </div>
            </div>
           <div id="main-display" class="bg-white rounded-2xl dark:bg-gray-800 px-5 py-5 mt-5 shadow-sm">
            <div id="city">
                <p class="text-sm dark:text-gray-400 text-slate-400">📍 Location</p>
                <h1 id="city-name" class="text-xl font-semibold dark:text-white">City, ---</h1>
            </div>
            <div id="temp" class="mt-2">
                <h1 id="temp-value" class="text-5xl font-semibold dark:text-white">---°C</h1>
            </div>
            <div id="w-cond" class="mt-3">
                <p id="wind-conditions-text" class="text-base text-slate-400 dark:text-gray-400">Partly Cloudy</p>
            </div>
            <div id="small-container" class="flex w-full justify-between mt-5 gap-5">
                <div id="humidity" class="flex-1 bg-sky-50 rounded-xl p-2 dark:bg-gray-700">
                    <p class="text-xs text-slate-400 font-semibold dark:text-gray-400">Humidity</p>
                    <h1 id="humidity-value" class="text-lg font-semibold dark:text-white">---%</h1>
                </div>
                <div id="wind-speed" class="flex-1 bg-sky-50 rounded-xl p-2 dark:bg-gray-700">
                    <p class="text-xs text-slate-400 font-semibold dark:text-gray-400">Wind Speed</p>
                    <h1 id="wind-speed-value" class="text-lg font-semibold dark:text-white">---km/h</h1>
                </div>
            </div>
           </div>
           <div id="error"></div>
           <div id="toast-container" class="absolute bottom-5 left-1/2 -translate-x-1/2 flex flex-col gap-2"></div>
        </div>
        <script src="app.js"></script>
    </body>
</html>
